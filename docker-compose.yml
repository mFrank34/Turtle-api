services:
  turtlenet:
    build: .
    container_name: turtlenet-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - TURTLENET_MANAGER_KEY=${TURTLENET_MANAGER_KEY}
      - TURTLENET_WORKER_KEY=${TURTLENET_WORKER_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
