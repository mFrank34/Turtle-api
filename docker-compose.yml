version: "3.9"

networks:
  frankslab-uk:
    external: true

services:
  turtle-api:
    build: .
    container_name: turtle-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - TURTLENET_MANAGER_KEY=${TURTLENET_MANAGER_KEY}
      - TURTLENET_WORKER_KEY=${TURTLENET_WORKER_KEY}
    volumes:
      - turtle-api-data:/data
    networks:
      - frankslab-uk
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else sys.exit(1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  turtle-api-data:
